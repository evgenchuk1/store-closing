<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,Helvetica,Arial,sans-serif;background:#0f1117;color:#e2e8f0;padding-bottom:110px}
header{background:#1a1d27;border-bottom:2px solid #2a2d3a;padding:16px;position:sticky;top:0;z-index:100}
.htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.htitle{font-size:26px;font-weight:800;color:#facc15}
.hsub{font-size:14px;color:#94a3b8;margin-top:2px}
.plabel{display:flex;justify-content:space-between;font-size:14px;color:#94a3b8;margin-bottom:6px}
.pcount{color:#facc15;font-weight:700}
.pbar-wrap{background:#2a2d3a;border-radius:99px;height:9px;overflow:hidden}
.pbar{height:100%;background:linear-gradient(90deg,#4ade80,#22d3ee);border-radius:99px;transition:width 0.4s;width:0%}
.content{padding:14px;display:flex;flex-direction:column;gap:8px}
.sec{font-size:13px;font-weight:700;color:#38bdf8;padding:14px 4px 6px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:#2a2d3a}
.item{border-radius:14px;border:1.5px solid;overflow:hidden}
.item.todo{background:#2b0f0f;border-color:#7c1f1f}
.item.done{background:#0d2b1a;border-color:#1a5c35}
.row{display:flex;align-items:center;gap:12px;padding:15px 13px;cursor:pointer}
.cb{width:30px;height:30px;border-radius:8px;border:2px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;font-weight:700}
.item.todo .cb{border-color:#7c1f1f;color:transparent}
.item.done .cb{border-color:#1a5c35;background:#1a5c35;color:#fff}
.txt{font-size:18px;font-weight:600;line-height:1.45;flex:1}
.item.todo .txt{color:#f87171}
.item.done .txt{color:#4ade80;text-decoration:line-through;opacity:0.75}
.pbtn{font-size:22px;flex-shrink:0;padding:4px;cursor:pointer}
.photo{display:none;width:100%}
.photo.open{display:block}
.photo img{width:100%;display:block;border-top:1px solid #2a2d3a;max-height:260px;object-fit:cover}
.fri{background:#1c1508;border:1.5px solid #92400e;border-radius:14px;padding:16px;margin-top:6px}
.fri-t{font-size:16px;font-weight:800;color:#fb923c;margin-bottom:10px}
.fri-b{font-size:16px;color:#fde68a;line-height:1.75}
.reset{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2a2d3a;color:#94a3b8;border:1.5px solid #3a3d4a;border-radius:99px;padding:14px 32px;font-size:16px;font-weight:700;cursor:pointer;z-index:200;font-family:-apple-system,Helvetica,Arial,sans-serif}
.done-all{text-align:center;padding:28px}
.done-all .em{font-size:48px}
.done-all .msg{font-size:22px;font-weight:800;color:#facc15;margin-top:8px}
</style>
</head>

var state={};
var phOpen={};
function load(){try{var s=localStorage.getItem('cls2');if(s)state=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem('cls2',JSON.stringify(state));}catch(e){}}
function tog(id){state[id]=!state[id];save();render();}
function togP(id,e){e.stopPropagation();phOpen[id]=!phOpen[id];render();}
function resetAll(){if(confirm('לאפס את כל הרשימה?')){state={};phOpen={};save();render();}}
function render(){
  var total=32,done=0;
  SECS.forEach(function(s){s.items.forEach(function(i){if(state[i.id])done++;});});
  document.getElementById('pc').textContent=done+' / '+total;
  document.getElementById('pb').style.width=(done/total*100)+'%';
  var app=document.getElementById('app');
  app.innerHTML='';
  SECS.forEach(function(sec){
    var d=document.createElement('div');d.className='sec';d.textContent=sec.t;app.appendChild(d);
    sec.items.forEach(function(item){
      var isDone=!!state[item.id];
      var hasPh=!!IMG[item.id];
      var isOpen=!!phOpen[item.id];
      var wrap=document.createElement('div');
      wrap.className='item '+(isDone?'done':'todo');
      var row=document.createElement('div');row.className='row';
      var cb=document.createElement('div');cb.className='cb';cb.textContent=isDone?'✓':'';
      var tx=document.createElement('div');tx.className='txt';tx.textContent=item.text;
      row.appendChild(cb);row.appendChild(tx);
      if(hasPh){
        var pb=document.createElement('div');pb.className='pbtn';pb.textContent=isOpen?'🔼':'📷';
        (function(id){pb.addEventListener('click',function(e){togP(id,e);})})(item.id);
        row.appendChild(pb);
      }
      (function(id){row.addEventListener('click',function(){tog(id);})})(item.id);
      wrap.appendChild(row);
      if(hasPh){
        var ph=document.createElement('div');ph.className='photo'+(isOpen?' open':'');
        var img=document.createElement('img');img.src=IMG[item.id];
        ph.appendChild(img);wrap.appendChild(ph);
      }
      app.appendChild(wrap);
    });
  });
  if(done===total){
    var c=document.createElement('div');c.className='done-all';
    c.innerHTML='<div class="em">🎉</div><div class="msg">הסניף סגור! כל הכבוד!</div>';
    app.appendChild(c);
  }
}
load();render();
